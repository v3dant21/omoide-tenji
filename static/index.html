<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rust Multi Image Upload</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      max-width: 1100px;
      margin: 0 auto;
      padding: 2em;
    }

    h1 {
      text-align: center;
      color: #2d3a4b;
      letter-spacing: 2px;
      margin-bottom: 0.8em;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(44, 62, 80, 0.08);
      padding: 2em;
      margin-bottom: 2em;
    }

    .form-group { margin-bottom: 1.5em; }

    label {
      display: block;
      margin-bottom: 0.5em;
      color: #2d3a4b;
      font-weight: 600;
    }

    input[type="file"] {
      padding: 0.6em;
      border-radius: 8px;
      border: 1px solid #bfc9d1;
      width: 100%;
      font-size: 1em;
      background: #fff;
    }

    button {
      background: linear-gradient(90deg, #4f8cff 0%, #3358e6 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85em 2em;
      font-size: 1.05em;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(44, 62, 80, 0.08);
      transition: background 0.2s;
    }

    button:hover {
      background: linear-gradient(90deg, #3358e6 0%, #4f8cff 100%);
    }

    .error {
      color: #e74c3c;
      margin-top: 0.8em;
      font-weight: 600;
    }

    .img-card {
      background: #f7fafd;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(44, 62, 80, 0.06);
      padding: 2em;
      text-align: center;
    }

    .img-card h3 {
      color: #3358e6;
      margin-bottom: 0.8em;
    }

    .grid {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .grid img {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #bfc9d1;
      background: #fff;
    }

    .muted {
      color: #7d8a98;
      font-size: 0.95em;
      margin-top: 1em;
    }
  </style>
</head>


<body>
  <h1>SHUFFEL</h1>

  <div class="card">
    <form id="upload-form">
      <div class="form-group">
        <label for="image-input">Choose images:</label>
        <input
          type="file"
          id="image-input"
          name="image"
          accept="image/*"
          multiple
          required
        />
      </div>

      <button type="submit">Upload & Preview</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <!-- ✅ Only one preview section -->
  <div class="img-card">
    <h3>Preview</h3>
    <div id="preview-grid" class="grid"></div>
    <div class="muted" id="preview-hint">No images selected.</div>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      // ✅ All elements exist now (no null issue)
      const form = document.getElementById("upload-form");
      const input = document.getElementById("image-input");
      const previewGrid = document.getElementById("preview-grid");
      const previewHint = document.getElementById("preview-hint");
      const errorDiv = document.getElementById("error");

      function clearPreview() {
        previewGrid.innerHTML = "";
        previewHint.style.display = "";
      }

      function showImages(srcList) {
        previewGrid.innerHTML = "";

        if (!srcList || srcList.length === 0) {
          previewHint.style.display = "";
          previewHint.textContent = "No images selected.";
          return;
        }

        previewHint.style.display = "none";
        for (const src of srcList) {
          const img = document.createElement("img");
          img.src = src;
          previewGrid.appendChild(img);
        }
      }

      // ✅ Local preview (before upload)
      input.addEventListener("change", () => {
        errorDiv.textContent = "";

        const files = input.files;
        if (!files || files.length === 0) {
          clearPreview();
          return;
        }

        const localUrls = [];
        for (const file of files) {
          localUrls.push(URL.createObjectURL(file));
        }

        showImages(localUrls);
      });

      // ✅ Upload to backend and replace preview using server response
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorDiv.textContent = "";

        const files = input.files;
        if (!files || files.length === 0) {
          errorDiv.textContent = "Please select at least one image.";
          return;
        }

        const formData = new FormData();
        for (const file of files) {
          // ✅ IMPORTANT: must match Rust backend: field name "image"
          formData.append("image", file);
        }

        try {
          const res = await fetch("/api/image", {
            method: "POST",
            body: formData
          });

          if (!res.ok) {
            const text = await res.text();
            throw new Error(`Upload failed (${res.status}): ${text}`);
          }

          // expected JSON: { images: ["data:image/...;base64,...", ...] }
          const data = await res.json();

          if (!data.images || data.images.length === 0) {
            throw new Error("Server returned no images.");
          }

          showImages(data.images);
        } catch (err) {
          errorDiv.textContent = err.message;
        }
      });
    });
  </script>
</body>
</html>
